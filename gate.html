<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS — Akses Terlindungi</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --purple-deep: #0d0a1a;
            --purple-dark: #130d2a;
            --purple-core: #7c3aed;
            --purple-bright: #a855f7;
            --purple-glow: #c084fc;
            --purple-neon: #e879f9;
            --text-primary: #f0e6ff;
            --text-muted: #9575cd;
            --accent-green: #34d399;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--purple-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* BG */
        .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .nebula { position: absolute; border-radius: 50%; }
        .n1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(124,58,237,0.13) 0%, transparent 70%); top:-150px;left:-150px; animation: nb 20s ease-in-out infinite alternate; }
        .n2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(232,121,249,0.08) 0%, transparent 70%); bottom:-100px;right:-100px; animation: nb 28s ease-in-out infinite alternate-reverse; }
        .grid-lines {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(124,58,237,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,58,237,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gd 30s linear infinite;
        }
        @keyframes nb { from{transform:translate(0,0);}to{transform:translate(40px,30px);} }
        @keyframes gd { from{background-position:0 0;}to{background-position:60px 60px;} }

        /* PARTICLES */
        .particles { position: absolute; inset: 0; }
        .p { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--purple-bright); animation: pf linear infinite; }
        @keyframes pf {
            0%{transform:translateY(100vh) translateX(0);opacity:0;}
            10%{opacity:.8;}90%{opacity:.8;}
            100%{transform:translateY(-100px) translateX(var(--drift));opacity:0;}
        }

        /* MAIN CARD */
        .gate-card {
            position: relative; z-index: 10;
            width: 100%; max-width: 460px;
            margin: 1rem;
            background: rgba(19,13,42,0.96);
            border: 1px solid rgba(124,58,237,0.3);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 0 0 1px rgba(168,85,247,0.08), 0 24px 60px rgba(0,0,0,0.6), 0 0 80px rgba(124,58,237,0.1);
            animation: card-in 0.8s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes card-in { from{opacity:0;transform:translateY(36px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);} }

        .glare { position:absolute;top:0;left:0;right:0;height:1px; background:linear-gradient(90deg,transparent,rgba(168,85,247,0.7),rgba(232,121,249,0.5),transparent); }
        .corner { position:absolute;width:16px;height:16px;border-color:var(--purple-core);border-style:solid; }
        .corner.tl{top:10px;left:10px;border-width:2px 0 0 2px;}
        .corner.tr{top:10px;right:10px;border-width:2px 2px 0 0;}
        .corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px;}
        .corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0;}

        /* LOCK ICON */
        .lock-wrap {
            width: 72px; height: 72px; margin: 0 auto 1.5rem;
            position: relative;
        }
        .lock-hex {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, var(--purple-core), var(--purple-neon));
            clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 30px rgba(168,85,247,0.5), 0 0 60px rgba(168,85,247,0.2);
            animation: hx 3s ease-in-out infinite;
        }
        @keyframes hx { 0%,100%{box-shadow:0 0 30px rgba(168,85,247,0.5),0 0 60px rgba(168,85,247,0.2);}50%{box-shadow:0 0 40px rgba(232,121,249,0.6),0 0 80px rgba(232,121,249,0.25);} }
        .lock-ring {
            position: absolute; inset: -8px;
            border: 1.5px solid rgba(168,85,247,0.3);
            clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
            animation: rp 3s ease-in-out infinite;
        }
        @keyframes rp { 0%,100%{opacity:.3;transform:scale(1);}50%{opacity:.8;transform:scale(1.06);} }

        /* TEXT */
        .gate-brand {
            font-family: 'Orbitron', sans-serif; font-size: 0.5rem;
            letter-spacing: 0.3em; color: var(--text-muted);
            text-transform: uppercase; text-align: center; margin-bottom: 0.4rem;
        }
        .gate-title {
            font-family: 'Orbitron', sans-serif; font-size: 1.4rem;
            font-weight: 900; letter-spacing: 0.08em; text-align: center;
            background: linear-gradient(135deg, #f0e6ff, #a855f7, #e879f9);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 1.75rem;
            line-height: 1.2;
        }

        /* DESTINATION BOX */
        .dest-box {
            background: rgba(13,10,26,0.7);
            border: 1px solid rgba(124,58,237,0.2);
            border-radius: 10px;
            padding: 0.9rem 1rem;
            margin-bottom: 1.75rem;
            display: flex; align-items: center; gap: 10px;
        }
        .dest-icon { flex-shrink: 0; color: var(--purple-bright); }
        .dest-info { flex: 1; overflow: hidden; }
        .dest-label {
            font-family: 'Orbitron', sans-serif; font-size: 0.45rem;
            letter-spacing: 0.2em; color: var(--text-muted); text-transform: uppercase;
            margin-bottom: 3px;
        }
        .dest-url {
            font-size: 0.8rem; color: var(--text-primary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        /* BUTTON */
        .btn-continue {
            width: 100%;
            padding: 1rem;
            border: none; border-radius: 10px;
            background: linear-gradient(135deg, #7c3aed, #a855f7, #c084fc);
            color: white;
            font-family: 'Orbitron', sans-serif; font-size: 0.7rem;
            font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(124,58,237,0.4), 0 0 0 1px rgba(168,85,247,0.2);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .btn-continue::before {
            content:''; position:absolute;inset:0;
            background:linear-gradient(135deg,transparent,rgba(255,255,255,0.12),transparent);
            transform:translateX(-100%); transition:transform 0.5s;
        }
        .btn-continue:hover::before { transform:translateX(100%); }
        .btn-continue:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(124,58,237,0.55); }
        .btn-continue:active { transform:translateY(0); }

        /* ALREADY LOGGED STATE */
        .state-logged {
            display: none;
        }
        .logged-badge {
            display: flex; align-items: center; gap: 8px; justify-content: center;
            background: rgba(52,211,153,0.08);
            border: 1px solid rgba(52,211,153,0.2);
            border-radius: 8px; padding: 0.6rem 1rem;
            margin-bottom: 1.25rem;
        }
        .green-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); animation: blink 2s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1;}50%{opacity:.2;} }
        .logged-text { font-family: 'Orbitron', sans-serif; font-size: 0.55rem; letter-spacing: 0.1em; color: var(--accent-green); text-transform: uppercase; }

        /* REDIRECT PROGRESS */
        .redirect-bar-wrap {
            display: none;
            background: rgba(13,10,26,0.5);
            border: 1px solid rgba(124,58,237,0.15);
            border-radius: 6px; overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .redirect-bar {
            height: 4px;
            background: linear-gradient(90deg, var(--purple-core), var(--purple-neon));
            width: 0%; transition: width linear;
            box-shadow: 0 0 8px rgba(168,85,247,0.6);
        }
        .redirect-text {
            text-align: center; font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem; letter-spacing: 0.15em; color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        /* DIVIDER */
        .divider { display:flex;align-items:center;gap:1rem;margin:1rem 0; }
        .divider-line { flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(124,58,237,0.25),transparent); }
        .divider-text { font-size:0.55rem;font-family:'Orbitron',sans-serif;letter-spacing:0.15em;color:var(--text-muted);white-space:nowrap; }

        /* SECURITY */
        .security-row {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 0.5rem;
        }
        .security-icon { color: var(--text-muted); }
        .security-text { font-family: 'Orbitron', sans-serif; font-size: 0.45rem; letter-spacing: 0.15em; color: var(--text-muted); text-transform: uppercase; }

        /* FOOTER */
        .gate-footer {
            position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center;
            font-family: 'Orbitron', sans-serif; font-size: 0.4rem;
            letter-spacing: 0.2em; color: rgba(149,117,205,0.4); text-transform: uppercase;
            white-space: nowrap;
        }
        .gate-footer span { color: rgba(168,85,247,0.5); }

        @media (max-width:480px) {
            .gate-card { padding: 2rem 1.5rem; }
            .gate-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="bg-layer">
    <div class="nebula n1"></div>
    <div class="nebula n2"></div>
    <div class="grid-lines"></div>
    <div class="particles" id="particles"></div>
</div>

<div class="gate-card">
    <div class="glare"></div>
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <!-- Lock icon -->
    <div class="lock-wrap">
        <div class="lock-hex">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="lock-ring"></div>
    </div>

    <div class="gate-brand">NEXUS — Protected Access</div>
    <div class="gate-title" id="gateTitle">Masuk untuk melanjutkan</div>

    <!-- Destination -->
    <div class="dest-box">
        <div class="dest-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        </div>
        <div class="dest-info">
            <div class="dest-label">Tujuan Akses</div>
            <div class="dest-url" id="destDisplay">Memuat...</div>
        </div>
    </div>

    <!-- Already logged in badge (shown when user has session) -->
    <div class="state-logged" id="stateLogged">
        <div class="logged-badge">
            <div class="green-dot"></div>
            <span class="logged-text">Sudah Login · <span id="loggedUsername">—</span></span>
        </div>
    </div>

    <!-- Redirect progress bar (shown when auto-redirecting) -->
    <div class="redirect-bar-wrap" id="redirectBarWrap">
        <div class="redirect-bar" id="redirectBar"></div>
    </div>
    <div class="redirect-text" id="redirectText" style="display:none;">Mengarahkan dalam <span id="countdown">3</span> detik...</div>

    <!-- Continue button (shown when NOT logged in) -->
    <button class="btn-continue" id="btnContinue">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <span id="btnContinueText">Masuk untuk melanjutkan</span>
    </button>

    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">NEXUS Auth</span>
        <div class="divider-line"></div>
    </div>

    <div class="security-row">
        <svg class="security-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="security-text">Dilindungi oleh NEXUS · ALDX Auth</span>
    </div>
</div>

<div class="gate-footer">NEXUS &nbsp;|&nbsp; DIBAWAH NAUNGAN <span>ALDX AUTH</span> &nbsp;|&nbsp; DIBUAT OLEH <span>ALDX</span></div>

<script>
    // Particles
    const isMobile = window.innerWidth < 768;
    const pc = isMobile ? 12 : 30;
    const pContainer = document.getElementById('particles');
    const frag = document.createDocumentFragment();
    for (let i = 0; i < pc; i++) {
        const p = document.createElement('div');
        p.className = 'p';
        p.style.cssText = `left:${Math.random()*100}%;--drift:${(Math.random()-.5)*80}px;animation-duration:${12+Math.random()*18}s;animation-delay:${-Math.random()*20}s;background:${Math.random()>.5?'#a855f7':'#e879f9'};`;
        frag.appendChild(p);
    }
    pContainer.appendChild(frag);

    // Parse target URL from query string
    const params = new URLSearchParams(window.location.search);
    const targetUrl = params.get('to') || '';
    let hostname = '';

    if (targetUrl) {
        try {
            hostname = new URL(decodeURIComponent(targetUrl)).hostname;
        } catch {
            hostname = targetUrl;
        }
        document.getElementById('destDisplay').textContent = hostname || targetUrl;
        document.getElementById('gateTitle').textContent = `Masuk untuk melanjutkan ke ${hostname}`;
        document.getElementById('btnContinueText').textContent = `Masuk untuk melanjutkan ke ${hostname}`;
    } else {
        document.getElementById('destDisplay').textContent = 'URL tidak ditemukan';
        document.getElementById('btnContinue').disabled = true;
    }

    // Check if already logged in
    function checkLogin() {
        const isLoggedIn = localStorage.getItem('isLoggedIn');
        const loginTime = localStorage.getItem('loginTime');
        if (isLoggedIn === 'true' && loginTime) {
            const threeDays = 3 * 24 * 60 * 60 * 1000;
            if (Date.now() - parseInt(loginTime) < threeDays) {
                return true;
            }
            // Expired
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            localStorage.removeItem('loginTime');
        }
        return false;
    }

    function startRedirect(delay = 3) {
        // Show logged badge + redirect bar
        document.getElementById('stateLogged').style.display = 'block';
        document.getElementById('loggedUsername').textContent = (localStorage.getItem('username') || 'User').toUpperCase();
        document.getElementById('btnContinue').style.display = 'none';
        document.getElementById('redirectBarWrap').style.display = 'block';
        document.getElementById('redirectText').style.display = 'block';

        const bar = document.getElementById('redirectBar');
        const cdEl = document.getElementById('countdown');

        // Animate bar
        setTimeout(() => {
            bar.style.transition = `width ${delay}s linear`;
            bar.style.width = '100%';
        }, 50);

        // Countdown
        let left = delay;
        cdEl.textContent = left;
        const interval = setInterval(() => {
            left--;
            cdEl.textContent = left;
            if (left <= 0) { clearInterval(interval); }
        }, 1000);

        setTimeout(() => {
            if (targetUrl) window.location.href = decodeURIComponent(targetUrl);
        }, delay * 1000);
    }

    if (checkLogin()) {
        startRedirect(3);
    }

    // Continue button → go to login, save target
    document.getElementById('btnContinue').addEventListener('click', () => {
        if (targetUrl) {
            // Save destination so login page can redirect back
            sessionStorage.setItem('nexus_redirect_to', decodeURIComponent(targetUrl));
        }
        // Redirect to login
        const base = window.location.href.replace(/[^/]*$/, '');
        window.location.href = `${base}index.html`;
    });
</script>
</body>
</html>
