<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NEXUS — Auth Gate</title>
<script>
  // Router landing: kalau ada ?to= → /go, kalau login → /dashboard, else /login
  (function(){
    const params = new URL(location.href).searchParams;
    const to = params.get('to');
    if(to){ location.replace('/go?to='+encodeURIComponent(to)); return; }
    try{
      const s = JSON.parse(localStorage.getItem('nexus_session'));
      location.replace(s ? '/dashboard.html' : '/login.html');
    }catch(e){ location.replace('/login.html'); }
  })();
</script>
</head>
<body style="background:#0d0a1a;color:#c084fc;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
Loading NEXUS…
</body>
</html>
