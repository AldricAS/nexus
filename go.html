<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>NEXUS — Gate</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/nexus/shared.css">
</head>
<body>
<div class="bg-layer"><div class="grid-lines"></div><div class="nebula-1"></div><div class="nebula-2"></div><div class="nebula-3"></div></div>

<div class="main-wrapper">
  <div class="logo-section">
    <div class="logo-icon">
      <div class="logo-ring"></div>
      <div class="logo-hex">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L4 7v10l8 5 8-5V7l-8-5z"/><path d="M12 22V12M4 7l8 5 8-5"/></svg>
      </div>
    </div>
    <div class="brand-name">NEXUS</div>
    <div class="brand-tagline">Authorization Required</div>
  </div>

  <div class="auth-card">
    <div class="card-glare"></div>
    <span class="card-corner tl"></span><span class="card-corner tr"></span>
    <span class="card-corner bl"></span><span class="card-corner br"></span>

    <div class="card-title">Verifikasi Akses</div>
    <div class="card-sub">Masuk untuk melanjutkan ke<br><b id="targetView">—</b></div>

    <div class="target-pill">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span id="targetHost">tujuan tidak diketahui</span>
    </div>

    <div id="alert" class="alert error"></div>

    <form id="loginForm">
      <div class="field-group">
        <label class="field-label">Email</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" class="input-field" id="email" placeholder="kamu@nexus.id" required/>
        </div>
      </div>
      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="field-wrap">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" class="input-field" id="password" placeholder="••••••••" required minlength="6"/>
        </div>
      </div>
      <button type="submit" class="btn-primary" id="goBtn">Masuk &amp; Lanjutkan</button>
    </form>

    <div class="divider"><div class="divider-line"></div><div class="divider-text">atau</div><div class="divider-line"></div></div>
    <a class="btn-ghost" id="registerLink" href="/register.html">Belum punya akun? Daftar</a>
  </div>

  <div class="footer-section">
    <div class="footer-brand">SECURED BY <span class="highlight">NEXUS</span></div>
    <div class="security-badge"><span class="security-dot"></span>Gate Protected</div>
  </div>
</div>

<script src="/nexus/auth.js"></script>
<script>
  const params = new URL(location.href).searchParams;
  const to = params.get('to') || '';
  const alertBox = document.getElementById('alert');

  function showError(m){ alertBox.textContent=m; alertBox.classList.add('show'); }

  let targetUrl = null;
  try{
    if(!to) throw new Error('Parameter tujuan tidak ditemukan');
    targetUrl = new URL(to);
    if(!/^https?:$/.test(targetUrl.protocol)) throw new Error('Protokol URL tidak diizinkan');
    document.getElementById('targetView').textContent = targetUrl.href;
    document.getElementById('targetHost').textContent = targetUrl.host;
  }catch(e){
    showError('URL tujuan tidak valid: ' + e.message);
    document.getElementById('goBtn').disabled = true;
  }

  document.getElementById('registerLink').href = '/register.html' + (to ? '?to='+encodeURIComponent(to) : '');

  // Already logged in → instant redirect
  if(NEXUS.getSession() && targetUrl){
    setTimeout(()=>{ window.location.replace(targetUrl.href); }, 400);
  }

  document.getElementById('loginForm').addEventListener('submit', e=>{
    e.preventDefault();
    if(!targetUrl) return;
    try{
      NEXUS.login({email: email.value, password: password.value});
      window.location.replace(targetUrl.href);
    }catch(err){ showError(err.message); }
  });
</script>
</body>
</html>
